services:
  postgres:
    image: postgres:16-alpine
    container_name: ssih-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: siih_hospital
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
