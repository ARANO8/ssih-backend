services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ssih-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:root@postgres:5432/siih_hospital
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_me}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-ssih-hospital-files}
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: ssih-postgres
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: siih_hospital
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d siih_hospital"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: ssih-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: ssih-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        sleep 2;
      done;
      mc mb -p local/${S3_BUCKET_NAME:-ssih-hospital-files} || true;
      mc anonymous set none local/${S3_BUCKET_NAME:-ssih-hospital-files} || true;
      exit 0;
      '

volumes:
  postgres_data:
  minio_data:
