services:
  postgres:
    image: postgres:16-alpine
    container_name: ssih-postgres
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: siih_hospital
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ssih-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: ssih-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        sleep 2;
      done;
      mc mb -p local/${S3_BUCKET_NAME:-ssih-hospital-files} || true;
      mc anonymous set none local/${S3_BUCKET_NAME:-ssih-hospital-files} || true;
      exit 0;
      '

volumes:
  postgres_data:
  minio_data:
